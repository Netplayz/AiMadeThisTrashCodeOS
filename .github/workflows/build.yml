name: Build AiMadeThisTrashCodeOS ISO

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential nasm grub-pc-bin xorriso

    - name: Build ISO
      run: make

    - name: Upload ISO artifact
      uses: actions/upload-artifact@v4
      with:
        name: AiMadeThisTrashCodeOS-ISO
        path: AiMadeThisTrashCodeOS.iso